<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Omkar Deshmukh | Portfolio</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Poppins', sans-serif;
            text-decoration: none;
            list-style: none;
        }

        :root {
            --bg-color: #080808;
            --main-color: #ff0000; 
            --text-color: white;
        }

        body {
            background: var(--bg-color);
            color: var(--text-color);
            overflow: hidden; 
            position: relative;
        }

        /* Subtle Particle Background */
        body::before {
            content: "";
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle, rgba(255,0,0,0.05) 1px, transparent 1px);
            background-size: 40px 40px;
            z-index: -1;
            animation: moveBg 15s linear infinite;
        }

        @keyframes moveBg {
            from { background-position: 0 0; }
            to { background-position: 40px 40px; }
        }

        header {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            padding: 2.5rem 10%;
            background: transparent;
            display: flex;
            justify-content: space-between;
            align-items: center;
            z-index: 100;
            animation: fadeInDown 1.5s ease;
        }

        .logo {
            font-size: 2rem;
            color: var(--main-color);
            font-weight: 800;
            letter-spacing: 2px;
        }

        nav a {
            font-size: 1.1rem;
            color: var(--text-color);
            margin-left: 2.5rem;
            transition: 0.4s;
            font-weight: 500;
        }

        nav a:hover {
            color: var(--main-color);
        }

        .home {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            gap: 12rem; 
            padding: 0 10%;
        }

        /* --- Large Standing Oval Image (No Glow, Moved Down) --- */
        .home-image {
            margin-top: 60px; /* Moved downside */
        }

        .home-image img {
            width: 420px; 
            height: 600px; 
            object-fit: cover;
            border-radius: 210px / 300px; 
            border: 3px solid var(--main-color);
            box-shadow: 0 0 20px var(--main-color); 
            animation: fadeInRight 1.8s ease;
            transition: 0.4s ease;
        }

        .home-image img:hover {
            transform: scale(1.02);
            box-shadow: 0 0 40px var(--main-color);
            
        }

        .home-content {
            animation: fadeInLeft 1.5s ease;
        }

        .home-content h1 {
            font-size: 4.5rem;
            font-weight: 800;
        }

        .home-content h1 span {
            color: var(--main-color);
        }

        .home-content h3 {
            font-size: 2.5rem;
            margin-bottom: 1rem;
        }

        #element {
            color: var(--main-color);
        }

        .home-content p {
            font-size: 1.1rem;
            max-width: 550px;
            margin-bottom: 3rem;
            line-height: 1.9;
            color: #dddddd;
        }

        .btn-group {
            display: flex;
            align-items: center;
            gap: 2.5rem;
        }

        .btn {
            display: inline-block;
            padding: 15px 42px;
            background: transparent;
            color: var(--main-color);
            border: 2px solid var(--main-color);
            border-radius: 10px;
            font-weight: 700;
            letter-spacing: 1.5px;
            text-transform: uppercase;
            transition: 0.5s;
            animation: pulseBtn 3s infinite;
        }

        @keyframes pulseBtn {
            0% { box-shadow: 0 0 0px var(--main-color); }
            50% { box-shadow: 0 0 20px var(--main-color); }
            100% { box-shadow: 0 0 0px var(--main-color); }
        }

        .btn:hover {
            background: var(--main-color);
            color: white;
            box-shadow: 0 0 30px var(--main-color);
            transform: translateY(-5px);
            animation: none;
        }

        .social-icons a {
            display: inline-flex;
            justify-content: center;
            align-items: center;
            width: 50px;
            height: 50px;
            border: 2px solid var(--main-color);
            border-radius: 50%;
            font-size: 1.4rem;
            color: var(--main-color);
            transition: 0.5s;
        }

        .social-icons a:hover {
            background: var(--main-color);
            color: black;
            box-shadow: 0 0 20px var(--main-color);
        }

        @keyframes fadeInLeft {
            from { opacity: 0; transform: translateX(-150px); }
            to { opacity: 1; transform: translateX(0); }
        }

        @keyframes fadeInRight {
            from { opacity: 0; transform: translateX(150px); }
            to { opacity: 1; transform: translateX(0); }
        }

        @keyframes fadeInDown {
            from { opacity: 0; transform: translateY(-70px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .typing-text span::after {
            content: "";
            border-right: 3px solid var(--main-color);
            animation: blink 0.7s infinite;
        }

        @keyframes blink {
            50% { border-color: transparent; }
        }
    </style>
</head>
<body>

    <header>
        <a href="#" class='logo'>PORTFOLIO</a>
        <nav>
            <a href="index.html" style="color: var(--main-color);">Home</a> 
            <a href="about.html">About me</a>
            <a href="skills.html">Skills</a>
            <a href="projects.html">Project</a>
            <a href="contact.html">Contact</a>
        </nav>
    </header>

    <section class="home">
        <div class="home-image">
            <img src="1.jpg" alt="Profile Image">
        </div>

        <div class="home-content">
            <h1>HI, It's <span>Omkar</span></h1>
            <h3 class="typing-text">I'm a <span id="element"></span></h3>
            <p>I specialize in building high-performance web applications and sleek user interfaces. Let's work together to bring your digital ideas to life.</p>
            
            <div class="btn-group">
                <a href="contact.html" class="btn">Hire Me</a>
                <div class="social-icons">
                    <a href="https://www.linkedin.com/in/omkar-deshmukh-3aba65379?utm_source=share&utm_campaign=share_via&utm_content=profile&utm_medium=android_app"><i class="fa-brands fa-linkedin"></i></a>
                    <a href="https://www.instagram.com/pvt_omkar21?igsh=N29kMmxiNnRiZWl3"><i class="fa-brands fa-instagram"></i></a>
                    <a href="https://youtube.com/@evilgamer-x9s?si=VKEF7_uscA7t0Vht"><i class="fa-brands fa-youtube"></i></a>
                    <a href="https://x.com/OmkarDeshm44766"><i class="fa-brands fa-x-twitter"></i></a>
                </div>
            </div>
        </div>
    </section>

    <script>
        const textElement = document.getElementById('element');
        const professions = ["Frontend Developer", "UI Designer", "Programmer", "Content Writer"];
        let profIndex = 0;
        let charIndex = 0;

        function type() {
            if (charIndex < professions[profIndex].length) {
                textElement.textContent += professions[profIndex].charAt(charIndex);
                charIndex++;
                setTimeout(type, 100);
            } else {
                setTimeout(erase, 2000);
            }
        }

        function erase() {
            if (charIndex > 0) {
                textElement.textContent = professions[profIndex].substring(0, charIndex - 1);
                charIndex--;
                setTimeout(erase, 50);
            } else {
                profIndex = (profIndex + 1) % professions.length;
                setTimeout(type, 500);
            }
        }
        document.addEventListener("DOMContentLoaded", type);
    </script>
</body>
</html>
